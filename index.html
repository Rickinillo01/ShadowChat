<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050508">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ShadowChat</title>
    <style>
        #error-overlay {
            position: fixed; top: 0; left: 0; right: 0; background: red; color: white;
            z-index: 999999; padding: 10px; font-family: monospace; display: none;
            white-space: pre-wrap; word-break: break-all;
        }
    </style>
    <script>
        window.addEventListener('error', function(e) {
            var el = document.getElementById('error-overlay');
            if(el) { el.style.display = 'block'; el.innerText += e.message + '\n' + e.filename + ':' + e.lineno + '\n'; }
        });
        window.addEventListener('unhandledrejection', function(e) {
            var el = document.getElementById('error-overlay');
            if(el) { el.style.display = 'block'; el.innerText += 'Promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '\n'; }
        });
    </script>
    <meta name="description" content="Secure encrypted messaging platform.">
    <meta name="keywords" content="chat, secure, messaging">
    <meta name="author" content="ShadowChat">

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.jpg">

    <!-- Open Graph -->
    <meta property="og:title" content="ShadowChat 2.0">
    <meta property="og:description" content="Secure encrypted messaging platform.">
    <meta property="og:type" content="website">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">

    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="error-overlay"></div>
    <div id="app">
        <!-- Intro Layer -->
        <div id="intro-layer" class="layer active">
            <div class="glitch-wrapper">
                <div class="glitch-text" data-text="ShadowChat">ShadowChat</div>
                <div class="intro-subtext">Establishing secure connection...</div>
            </div>
        </div>

        <!-- Chat Layer (hidden, revealed by secret sequence) -->
        <div id="chat-layer" class="layer">
            <!-- Auth and Chat views are injected here -->
            <div id="auth-view" class="hidden">
                <!-- Populated by auth.js -->
            </div>
            <div id="chat-view" class="hidden">
                <!-- Populated by chat.js -->
            </div>
        </div>
    </div>

    <!-- Security & Anti-Screenshot protection -->
    <script src="./src/security.js"></script>

    <!-- App Entry Point -->
    <script type="module" src="./src/main.js?v=2"></script>
</body>
</html>
