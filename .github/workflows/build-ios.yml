name: Build iOS IPA

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS App (Unsigned IPA)
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Temporary Package.json
        run: |
          cat << 'EOF' > package.json
          {
            "name": "shadowchat",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0",
              "cordova-plugin-camera": "^8.0.0",
              "onesignal-cordova-plugin": "^5.1.8"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/assets": "^3.0.5"
            }
          }
          EOF

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor
        run: |
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.rickinillo.shadowchat",
            "appName": "ShadowChat",
            "webDir": "."
          }
          EOF
          npx cap add ios
          npx cap sync ios

      - name: Build Xcode Project and Create IPA
        run: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos"
          
          mkdir -p Payload
          mv build/Release-iphoneos/App.app Payload/
          zip -r ShadowChat.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowChat-iOS
          path: ios/App/ShadowChat.ipa
