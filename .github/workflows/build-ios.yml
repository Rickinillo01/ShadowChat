name: Build iOS IPA

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-ios:
    name: Build iOS App (Unsigned IPA)
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Temporary Package.json
        run: |
          cat << 'EOF' > package.json
          {
            "name": "shadowchat",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "^6.0.0",
              "@capacitor/ios": "^6.0.0",
              "cordova-plugin-camera": "^8.0.0",
              "onesignal-cordova-plugin": "^5.1.8",
              "firebase": "^10.12.2"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.0.0",
              "@capacitor/assets": "^3.0.5",
              "esbuild": "^0.21.5"
            }
          }
          EOF

      - name: Install Dependencies
        run: npm install

      - name: Initialize Capacitor
        run: |
          mkdir www
          cp index.html www/
          cp icon.jpg www/
          cp -r src www/
          
          # Convert CDN imports to NPM imports for bundling
          sed -i '' 's|https://www.gstatic.com/firebasejs/[^/]*/firebase-app\.js|firebase/app|g' www/src/firebase.js
          sed -i '' 's|https://www.gstatic.com/firebasejs/[^/]*/firebase-auth\.js|firebase/auth|g' www/src/firebase.js
          sed -i '' 's|https://www.gstatic.com/firebasejs/[^/]*/firebase-database\.js|firebase/database|g' www/src/firebase.js
          sed -i '' 's|https://www.gstatic.com/firebasejs/[^/]*/firebase-storage\.js|firebase/storage|g' www/src/firebase.js
          sed -i '' 's|https://www.gstatic.com/firebasejs/[^/]*/firebase-auth\.js|firebase/auth|g' www/src/main.js
          
          # Convert dynamic imports to require to allow IIFE bundling
          find www/src -name "*.js" -exec sed -i '' 's|import(|require(|g' {} +
          
          # Bundle the app into ONE single classic script (IIFE)
          npx esbuild www/src/main.js --bundle --minify --format=iife --target=es2020 --outfile=www/dist/bundle.js
          
          # Verify files
          ls -la www/dist/
          
          # Point index.html to the bundled classic script
          sed -i '' 's|<script type="module" src="./src/main.js"></script>|<script src="./dist/bundle.js"></script>|g' www/index.html

          cat << 'EOF' > capacitor.config.json
          {
            "appId": "com.rickinillo.shadowchat",
            "appName": "ShadowChat",
            "webDir": "www"
          }
          EOF
          npx cap add ios
          npx cap sync ios

      - name: Build Xcode Project and Create IPA
        run: |
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR="$(PWD)/build/Release-iphoneos"
          
          mkdir -p Payload
          mv build/Release-iphoneos/App.app Payload/
          zip -r ShadowChat.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowChat-iOS
          path: ios/App/ShadowChat.ipa
